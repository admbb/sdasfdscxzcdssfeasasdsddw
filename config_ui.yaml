    tolerance: 50
    interval: 300
    url: http://www.gstatic.com/generate_204

  - name: 🫧 nb优质节点
    type: url-test
    lazy: true
    use: [42]
    tolerance: 50
    interval: 300
    url: http://www.gstatic.com/generate_204

  - name: 🚀 自建节点
    type: url-test
    lazy: true
